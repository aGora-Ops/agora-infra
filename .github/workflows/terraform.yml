name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Action (plan|apply)"
        required: true
        default: plan
        type: choice
        options: [plan, apply]
      environment:
        description: "Environment"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  plan-dev:
    name: Plan Dev
    if: github.event_name != 'workflow_dispatch' || inputs.environment == 'dev'
    uses: PACE-Stagecraft/PACE-Stagecraft-workflows/.github/workflows/terraform-plan.yml@main
    with:
      environment: dev
      working_directory: environments/dev
      alert_email: ${{ vars.ALERT_EMAIL }}
    secrets:
      AWS_PLAN_ROLE_ARN: ${{ secrets.AWS_PLAN_ROLE_ARN }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  plan-prod:
    name: Plan Prod
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    uses: PACE-Stagecraft/PACE-Stagecraft-workflows/.github/workflows/terraform-plan.yml@main
    with:
      environment: prod
      working_directory: environments/prod
      alert_email: ${{ vars.ALERT_EMAIL }}
    secrets:
      AWS_PLAN_ROLE_ARN: ${{ secrets.AWS_PLAN_ROLE_ARN }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  apply-dev:
    name: Apply Dev (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && inputs.environment == 'dev'
    needs: plan-dev
    uses: PACE-Stagecraft/PACE-Stagecraft-workflows/.github/workflows/terraform-apply.yml@main
    with:
      environment: dev
      working_directory: environments/dev
      alert_email: ${{ vars.ALERT_EMAIL }}
    secrets:
      AWS_APPLY_ROLE_ARN: ${{ secrets.AWS_APPLY_ROLE_ARN }}

  apply-prod:
    name: Apply Prod (requires approval)
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && inputs.environment == 'prod'
    needs: plan-prod
    uses: PACE-Stagecraft/PACE-Stagecraft-workflows/.github/workflows/terraform-apply.yml@main
    with:
      environment: prod
      working_directory: environments/prod
      alert_email: ${{ vars.ALERT_EMAIL }}
    secrets:
      AWS_APPLY_ROLE_ARN: ${{ secrets.AWS_APPLY_ROLE_ARN }}
