name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Action (plan|apply)"
        required: true
        default: plan
        type: choice
        options: [plan, apply]
      environment:
        description: "Environment"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

# Reusable terraform-plan/apply jobs need these; a called workflow can't get
# more than the caller grants, so they must be declared here or the run fails
# to start ("requesting id-token: write ... allowed id-token: none").
permissions:
  id-token: write        # OIDC federation to AWS
  contents: read         # checkout
  pull-requests: write   # post the plan/cost as a PR comment
  security-events: write # upload Checkov SARIF findings to the Security tab

jobs:
  plan-dev:
    name: Plan Dev
    if: github.event_name != 'workflow_dispatch' || inputs.environment == 'dev'
    uses: aGora-Ops/agora-workflows/.github/workflows/terraform-plan.yml@main
    with:
      environment: dev
      working_directory: environments/dev
      alert_email: ${{ vars.ALERT_EMAIL }}
    secrets:
      AWS_PLAN_ROLE_ARN: ${{ secrets.AWS_PLAN_ROLE_ARN }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  plan-prod:
    name: Plan Prod
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    needs: plan-dev
    uses: aGora-Ops/agora-workflows/.github/workflows/terraform-plan.yml@main
    with:
      environment: prod
      working_directory: environments/prod
      alert_email: ${{ vars.ALERT_EMAIL }}
    secrets:
      AWS_PLAN_ROLE_ARN: ${{ secrets.AWS_PLAN_ROLE_ARN }}
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  apply-dev:
    name: Apply Dev (manual)
    # Gated: push to main runs plan only. Apply runs only when explicitly
    # dispatched, so live dev infra is never changed without review.
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && inputs.environment == 'dev'
    needs: plan-dev
    uses: aGora-Ops/agora-workflows/.github/workflows/terraform-apply.yml@main
    with:
      environment: dev
      working_directory: environments/dev
    secrets:
      AWS_APPLY_ROLE_ARN: ${{ secrets.AWS_APPLY_ROLE_ARN }}
#test
  apply-prod:
    name: Apply Prod (requires approval)
    if: |
      github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && inputs.environment == 'prod'
    needs: [plan-prod]
    uses: aGora-Ops/agora-workflows/.github/workflows/terraform-apply.yml@main
    with:
      environment: prod   # "prod" GitHub Environment must have required reviewers
      working_directory: environments/prod
    secrets:
      AWS_APPLY_ROLE_ARN: ${{ secrets.AWS_APPLY_ROLE_ARN }}
